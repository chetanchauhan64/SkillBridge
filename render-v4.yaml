services:
  - type: web
    name: skillbridge-app
    plan: free
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: skillbridge-db
          property: connectionString

databases:
  - name: skillbridge-db
    plan: free
